<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2</title>
    <link rel="stylesheet" href="latihan-2.css">
</head>

<body>

    <h2>FAQ / Accordion</h2>
    <section class="faq">
        <details>
            <summary>Apa itu HTML?</summary>
            <p>HTML adalah bahasa markup untuk membuat halaman web.</p>
        </details>

        <details>
            <summary>Apa itu CSS?</summary>
            <p>CSS digunakan untuk styling tampilan web.</p>
        </details>

        <details>
            <summary>Apa itu CSS Grid?</summary>
            <p>CSS Grid digunakan untuk membuat layout.</p>
        </details>
    </section>


    <h2>Image Hover Overlay</h2>
    <section class="gallery">
        <div class="img" data-title="Gambar 1">
            <img src="https://picsum.photos/300?1">
        </div>
        <div class="img" data-title="Gambar 2">
            <img src="https://picsum.photos/300?2">
        </div>
        <div class="img" data-title="Gambar 3">
            <img src="https://picsum.photos/300?3">
        </div>
        <div class="img" data-title="Gambar 4">
            <img src="https://picsum.photos/300?4">
        </div>
    </section>


    <h2>Progress Bar</h2>
    <section class="progress-section">

        <div class="progress" style="--progress: 75%;">
            <span>75%</span>
        </div>

        <div class="progress" style="--progress: 50%;">
            <span>50%</span>
        </div>

        <div class="progress" style="--progress: 30%;">
            <span>30%</span>
        </div>

    </section>

</body>

</html>
