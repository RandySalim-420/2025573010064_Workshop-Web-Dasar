<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <h1 Latihan-1 HTML></h1>
    <link rel="stylesheet" href="latihan-1.css">
    </head>
<body>

    <div class="container">

        <section>
            <h3>1. Tombol (Buttons)</h3>
            <div class="flex-group">
                <button class="btn btn-primary">Primary</button>
                <button class="btn btn-secondary">Secondary</button>
                <button class="btn btn-danger">Danger</button>
                <button class="btn btn-outline">Outline</button>
            </div>
        </section>

        <hr>

        <section>
            <h3>2. Badge / Tags</h3>
            <div class="flex-group">
                <span class="badge badge-blue">Update</span>
                <span class="badge badge-purple">Premium</span>
                <span class="badge badge-orange">Hot</span>
            </div>
        </section>

        <hr>

        <section>
            <h3>3. Alert Box</h3>
            <div class="alert alert-success">✅ <b>Success:</b> Data berhasil diunggah!</div>
            <div class="alert alert-warning">⚠️ <b>Warning:</b> Kapasitas penyimpanan hampir penuh.</div>
            <div class="alert alert-error">❌ <b>Error:</b> Koneksi ke database terputus.</div>
        </section>
    </div>

</body>
</html>
